services:
  app:
    build: .
    image: model2api:latest
    container_name: model2api
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      # Storage backend: json | sqlite | git  (postgres/mysql not built in this port)
      - STORAGE_BACKEND=json

      # Database (when STORAGE_BACKEND=sqlite)
      # - DATABASE_URL=sqlite:///app/data/accounts.db

      # Git repo (when STORAGE_BACKEND=git)
      # - GIT_REPO_URL=https://github.com/user/repo.git
      # - GIT_TOKEN=ghp_xxxxxxxxxxxx
      # - GIT_BRANCH=main
      # - GIT_FILE_PATH=accounts.json

      # Auth key override (overrides config.json "auth-key")
      # - CHATGPT2API_AUTH_KEY=your_secret_key

      # Public base URL (for image links)
      # - CHATGPT2API_BASE_URL=https://your-domain.com
